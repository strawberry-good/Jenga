<p class="auto-style4" data-end="224" data-start="145">我相信設計不只是視覺的美感，更是一種溝通與解決問題的方式。從平面設計、品牌識別到 UI/UX，</p>
<p class="auto-style4" data-end="224" data-start="145">我喜歡在每一個專案中挖掘故事、建立邏輯，讓視覺成為有意義的連結。</p>
<p class="auto-style4" data-end="292" data-start="226">日常生活是我靈感的來源，無論是一杯咖啡的包裝、一張車站的指示圖，</p>
<p class="auto-style4" data-end="292" data-start="226">甚至是一段對話，我都樂於拆解其中的設計思維，再轉化為自己的創作語言。</p>
